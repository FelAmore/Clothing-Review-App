<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ADS Store{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" type="text/css" />
</head>
<body>

    <header>
        <div class="header-inner">
            <a href="/" class="logo">ADS Store 🛍️</a>
            <nav>
                <ul>
                    <li><a href="/">Home</a></li>
                    {% for dept in departments %}
                    <li><a href="/browse/department/{{ dept }}">{{ dept }}</a></li>
                    {% endfor %}
                </ul>
            </nav>
            
            <form class="header-search" action="/search" method="GET">
                <input type="text" name="q" placeholder="Search clothing...">
                <button type="submit">Search</button>
            </form>
        </div>
    </header>

    <main>
        {% block body %}
        {% endblock %}
    </main>

    <footer>
        <p>ADS Store &copy; 2026 · Women's clothing review</p>
    </footer>

    <script src="{{ url_for('static', filename='jquery-3.6.0.js') }}"></script>
    {% block script %}
    {% endblock %}

</body>
</html>
